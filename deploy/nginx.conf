# Nginx site config for Blat-Chat.
# Place at /etc/nginx/sites-available/blatchat and symlink to sites-enabled.
# Replace `chat.example.com` with your real domain (and the cert paths below).
#
# - Certs: issued by Let's Encrypt via `certbot --nginx`. Auto-renews via
#   certbot.timer. The /.well-known/acme-challenge passthrough on :80 lets
#   renewals keep working even if the Node app is down.
# - Node: bound to 127.0.0.1:3000 (set in .env with PORT=3000). Never expose
#   Node directly — nginx handles TLS, HSTS, and security headers.
# - Upload cap: 12M (server caps at 10MB for both photos and voice messages).

# ---- HTTP: ACME challenge passthrough + 301 redirect to HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name chat.example.com;

    # Let certbot renewals through without needing the app to be up.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS: TLS + reverse proxy to Node ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.example.com;

    # ---- TLS (Let's Encrypt paths) ----
    ssl_certificate     /etc/letsencrypt/live/chat.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---- Security headers (defence in depth on top of helmet) ----
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # HSTS — only after you've confirmed HTTPS works.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- Uploads: 10MB cap on the app side, give a little headroom ----
    client_max_body_size 12M;

    # ---- Proxy to Node ----
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
