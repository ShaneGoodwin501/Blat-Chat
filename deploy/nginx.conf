# Nginx site config for Blat-Chat.
# Place at /etc/nginx/sites-available/blatchat and symlink to sites-enabled.
# Assumes you have a server_name like chat.example.com with DNS A record pointing at the box.

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name chat.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.example.com;

    # ---- TLS (Let's Encrypt paths; adjust to your distro) ----
    ssl_certificate     /etc/letsencrypt/live/chat.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ---- Security headers (defence in depth on top of helmet) ----
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # HSTS — only after you've confirmed HTTPS works
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- Uploads: 5MB cap matches the app's multer limit ----
    client_max_body_size 6m;

    # ---- Proxy to Node ----
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # WebSocket support (Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Optional: cache static assets aggressively
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|webp|svg)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1h;
        expires 1h;
    }
}
