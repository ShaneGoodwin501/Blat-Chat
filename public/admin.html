<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e1116">
  <title>Blat-Chat — Admin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <header class="bar">
      <h1>Admin</h1>
      <span class="spacer"></span>
      <a class="btn" href="/">Chat</a>
      <button class="link" id="logoutBtn">Sign out</button>
    </header>

    <main class="admin">
      <div class="card">
        <h2>Add user</h2>
        <form id="addUserForm" class="form-grid" autocomplete="off">
          <div class="row">
            <label for="nu_username">Username</label>
            <input id="nu_username" name="username" required minlength="3" maxlength="32" pattern="[a-zA-Z0-9_.\-]+" autocapitalize="none" spellcheck="false">
          </div>
          <div class="row">
            <label for="nu_display">Display name</label>
            <input id="nu_display" name="display_name" maxlength="32" placeholder="(defaults to username)">
          </div>
          <div class="row">
            <label for="nu_password">Password</label>
            <input id="nu_password" name="password" type="password" required minlength="8" autocomplete="new-password">
          </div>
          <div class="row">
            <label for="nu_role">Role</label>
            <select id="nu_role" name="role">
              <option value="user" selected>user</option>
              <option value="admin">admin</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="submit">Create</button>
          </div>
          <div class="err" id="addUserErr"></div>
        </form>
      </div>

      <div class="card">
        <h2>Users</h2>
        <table id="usersTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>Username</th>
              <th>Display</th>
              <th>Role</th>
              <th>Active</th>
              <th>Created</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="7" style="color:var(--text-faint)">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
