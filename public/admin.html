<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0b10">
  <title>Blat-Chat — Admin</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <header class="bar">
      <h1><span class="dot"></span> Admin</h1>
      <span class="spacer"></span>
      <button class="menu-btn" id="menuBtn" aria-label="Menu" title="Menu" aria-haspopup="true" aria-expanded="false">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <div class="dropdown hidden" id="menuDropdown" role="menu">
        <a href="/" role="menuitem"><span class="ico">💬</span> Back to chat</a>
        <div class="divider"></div>
        <button id="logoutBtn" class="danger" role="menuitem"><span class="ico">⎋</span> Sign out</button>
      </div>
    </header>

    <main class="admin">
      <div class="card">
        <div class="card-header">
          <h2>Add user</h2>
        </div>
        <form id="addUserForm" class="form-grid" autocomplete="off">
          <div class="row">
            <label for="nu_username">Username</label>
            <input id="nu_username" name="username" required minlength="3" maxlength="32" pattern="[a-zA-Z0-9_.\-]+" autocapitalize="none" spellcheck="false">
          </div>
          <div class="row">
            <label for="nu_display">Display name</label>
            <input id="nu_display" name="display_name" maxlength="32" placeholder="(defaults to username)">
          </div>
          <div class="row">
            <label for="nu_password">Password</label>
            <input id="nu_password" name="password" type="password" required minlength="8" autocomplete="new-password">
          </div>
          <div class="row">
            <label for="nu_role">Role</label>
            <select id="nu_role" name="role">
              <option value="user" selected>user</option>
              <option value="admin">admin</option>
            </select>
          </div>
          <div class="form-actions">
            <button type="submit">Create</button>
          </div>
          <div class="err" id="addUserErr"></div>
        </form>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>Users</h2>
          <span class="count" id="usersCount">—</span>
        </div>
        <table>
          <thead>
            <tr>
              <th>User</th>
              <th>Role</th>
              <th>Active</th>
              <th>Created</th>
              <th style="text-align:right">Actions</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="5" style="color:var(--text-faint)">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="toast-stack" id="toastStack"></div>
  <script src="/js/admin.js"></script>
</body>
</html>
