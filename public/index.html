<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0b10">
  <title>Blat-Chat</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <header class="bar">
      <h1><span class="dot"></span> Blat-Chat</h1>
      <span class="spacer"></span>
      <span class="me">
        <span class="me-greeting">Signed in as</span>
        <span class="me-name" id="meLabel">…</span>
      </span>
      <button class="menu-btn" id="menuBtn" aria-label="Menu" title="Menu" aria-haspopup="true" aria-expanded="false">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <div class="dropdown hidden" id="menuDropdown" role="menu">
        <button id="nickBtn" role="menuitem"><span class="ico">✎</span> Change nickname</button>
        <button id="pwBtn"   role="menuitem"><span class="ico">🔒</span> Change password</button>
        <a    id="adminLink" class="hidden" role="menuitem" href="/admin"><span class="ico">⚙</span> Admin</a>
        <div class="divider"></div>
        <button id="logoutBtn" class="danger" role="menuitem"><span class="ico">⎋</span> Sign out</button>
      </div>
    </header>

    <div class="chat">
      <div class="messages" id="messages" aria-live="polite"></div>
      <form class="composer" id="composer" autocomplete="off">
        <div class="attach-preview hidden" id="attachPreview">
          <img id="attachThumb" alt="">
          <span class="name" id="attachName"></span>
          <button type="button" id="attachClear" title="Remove">×</button>
        </div>
        <label for="photoInput" class="icon-btn" title="Attach photo" aria-label="Attach photo">📎</label>
        <input type="file" id="photoInput" accept="image/jpeg,image/png,image/gif,image/webp">
        <textarea id="textInput" placeholder="Message…" rows="1" maxlength="4000" aria-label="Message"></textarea>
        <button type="submit" class="send-btn" aria-label="Send">➤</button>
      </form>
    </div>
  </div>

  <div class="lightbox hidden" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close" title="Close (Esc)">✕</button>
    <img id="lightboxImg" alt="">
  </div>

  <div class="toast-stack" id="toastStack"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/chat.js"></script>
</body>
</html>
