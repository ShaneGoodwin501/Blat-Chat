<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0b10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FAMILY-CHAT">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title data-i18n="app.title">FAMILY-CHAT</title>
  <meta name="blatchat-lang" content="__BLATCHAT_LANG__">
  <link rel="stylesheet" href="/css/style.css?v=47">
</head>
<body>
  <div class="app">
    <header class="bar">
      <div class="me-avatar" id="meAvatar" aria-label="My profile"></div>
      <h1><span data-i18n="app.brand">FAMILY-CHAT</span></h1>
      <span class="spacer"></span>
      <button class="icon-btn" id="fullscreenBtn" aria-label="Fullscreen" data-i18n-aria="header.fullscreen" title="Fullscreen">
        <svg class="fs-icon fs-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 9V4h5"/>
          <path d="M20 9V4h-5"/>
          <path d="M4 15v5h5"/>
          <path d="M20 15v5h-5"/>
        </svg>
        <svg class="fs-icon fs-exit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9 4v5H4"/>
          <path d="M15 4v5h5"/>
          <path d="M9 20v-5H4"/>
          <path d="M15 20v-5h5"/>
        </svg>
      </button>
      <button class="menu-btn" id="menuBtn" aria-label="Menu" data-i18n-aria="header.menu" title="Menu" aria-haspopup="true" aria-expanded="false">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <div class="dropdown hidden" id="menuDropdown" role="menu">
        <button id="avatarMenuBtn" role="menuitem" type="button"><span class="ico">&#x1F5BC;</span> <span data-i18n="menu.profile_photo">Profile photo</span></button>
        <button id="nickBtn" role="menuitem" type="button"><span class="ico">&#x270E;</span> <span data-i18n="menu.change_nickname">Change nickname</span></button>
        <button id="pwBtn" role="menuitem" type="button"><span class="ico">&#x1F512;</span> <span data-i18n="menu.change_password">Change password</span></button>
        <button id="langBtn" role="menuitem" type="button"><span class="ico">&#x1F310;</span> <span data-i18n="menu.language">Language</span> <span class="lang-secondary">/ Язык</span></button>
        <button id="notifBtn" role="menuitem" type="button"><span class="ico">&#x1F514;</span> <span id="notifBtnLabel" data-i18n="chat.notif.enable">Notifications</span></button>
        <a    id="adminLink" class="hidden" role="menuitem" href="/admin"><span class="ico">&#x2699;</span> <span data-i18n="menu.admin">Admin</span></a>
        <div class="divider"></div>
        <button id="logoutBtn" class="danger" role="menuitem" type="button"><span class="ico">&#x238B;</span> <span data-i18n="menu.sign_out">Sign out</span></button>
      </div>
    </header>

    <div class="chat">
      <div class="messages" id="messages" aria-live="polite" data-drag-text="Drop to attach"></div>
      <button type="button" class="load-older hidden" id="loadOlderBtn" data-i18n="chat.load_older">Load older messages</button>
      <button type="button" class="scroll-to-bottom hidden" id="scrollBottomBtn" aria-label="Scroll to latest" title="Scroll to latest">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </button>
      <div class="typing hidden" id="typingIndicator" aria-live="polite"></div>
      <div class="composer-stack">
        <!--
          The attach preview must live OUTSIDE the .composer <form>. The
          composer has overflow:hidden (so flex children can't push it
          wider than the chat column on narrow phones), and any
          position:absolute child positioned with bottom:100% gets
          clipped by that. Wrapping the form + preview in .composer-stack
          gives the absolute preview a containing block whose height
          equals the composer's, so bottom:100% lands cleanly above it.
        -->
        <div class="attach-preview hidden" id="attachPreview">
          <img id="attachThumb" alt="">
          <span class="name" id="attachName"></span>
          <button type="button" id="attachClear" data-i18n-aria="chat.attach_clear" title="Remove">&times;</button>
        </div>
        <div class="recording hidden" id="recordingIndicator" aria-live="polite">
          <span class="rec-dot" aria-hidden="true"></span>
          <span class="rec-time" id="recordingTime">0:00</span>
          <button type="button" id="recordingCancel" data-i18n-aria="chat.voice.cancel" aria-label="Cancel recording" title="Cancel">&times;</button>
        </div>
        <form class="composer" id="composer" autocomplete="off">
          <button type="button" class="icon-btn emoji-btn" id="emojiBtn" data-i18n-aria="chat.emoji" aria-label="Emoji" title="Emoji">&#x1F600;</button>
          <label for="photoInput" class="icon-btn" data-i18n-aria="chat.attach" aria-label="Attach photo" title="Attach photo">&#x1F4CE;</label>
          <input type="file" id="photoInput" accept="image/*">
          <button type="button" class="icon-btn voice-btn" id="voiceBtn" data-i18n-aria="chat.voice.record" aria-label="Record voice message" title="Record voice message">&#x1F3A4;</button>
          <textarea id="textInput" data-i18n-attr="placeholder:chat.placeholder" placeholder="Message&hellip;" rows="1" maxlength="4000" aria-label="Message"></textarea>
          <button type="submit" class="send-btn" data-i18n-aria="chat.send" aria-label="Send">&#x27A4;</button>
        </form>
      </div>
    </div>
  </div>

  <div class="lightbox hidden" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lightbox-close" id="lightboxClose" aria-label="Close" title="Close (Esc)">&times;</button>
    <img id="lightboxImg" alt="">
  </div>

  <div class="toast-stack" id="toastStack" aria-live="polite"></div>

  <script src="/js/viewport-height.js?v=6"></script>
  <script src="/js/i18n.js?v=11"></script>
  <script src="/js/password-reveal.js?v=3"></script>
  <script src="/js/avatar-crop.js?v=3"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/chat.js?v=35"></script>
</body>
</html>
