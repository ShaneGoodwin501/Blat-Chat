<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0b10">
  <title>Blat-Chat &mdash; Sign in</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="login-page">
    <form class="login-card" id="loginForm" autocomplete="on">
      <div class="brand"><div class="dot"></div></div>
      <h1 data-i18n="app.brand">Blat-Chat</h1>
      <p class="sub" data-i18n="login.subtitle">Sign in to the family chat</p>

      <label for="username" data-i18n="login.username">Username</label>
      <input id="username" name="username" type="text" required autofocus autocomplete="username" autocapitalize="none" spellcheck="false">

      <label for="password" data-i18n="login.password">Password</label>
      <input id="password" name="password" type="password" required autocomplete="current-password">

      <button type="submit" id="loginBtn" data-i18n="login.submit">Sign in</button>
      <div class="error" id="loginError"></div>
    </form>
  </main>
  <script src="/js/i18n.js"></script>
  <script src="/js/password-reveal.js"></script>
  <script src="/js/login.js"></script>
  <script>
    // Apply language as soon as the strings are in scope.
    (async function () {
      await window.loadLang();
      window.callI18n();
    })();
  </script>
</body>
</html>
